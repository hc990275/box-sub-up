<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sing-box 订阅更新器</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', -apple-system, system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            margin-bottom: 24px;
            text-align: center;
        }

        h1 {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .label-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .label { font-size: 0.9rem; color: #94a3b8; font-weight: 500; }
        .value { font-size: 1.2rem; font-weight: 700; color: var(--primary); }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            appearance: none;
            outline: none;
            margin: 10px 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        button:active { transform: scale(0.98); opacity: 0.9; }

        .log-container {
            background: #000;
            border-radius: 12px;
            padding: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            height: 150px;
            overflow-y: auto;
            border: 1px solid #334155;
        }

        .log-line {
            margin-bottom: 4px;
            color: #10b981;
            white-space: pre-wrap;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px #10b981;
        }

        /* 新增映射列表样式 */
        .mapping-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .mapping-tag { font-size: 0.85rem; color: #fff; }
        .mapping-path { font-size: 0.7rem; color: #64748b; margin-top: 2px; }
        .checkbox-container {
            width: 20px;
            height: 20px;
            position: relative;
        }
        input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        select {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #334155;
            color: #fff;
            border-radius: 8px;
            outline: none;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Box-sub-up Control</h1>
            <div id="box-version" style="font-size: 0.7rem; color: #64748b; margin-top: 4px;">Box for Root [Loading...]</div>
        </header>

        <div class="card" id="box-info-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; margin-bottom: 20px;">
            <div class="info-item">
                <div class="label" style="font-size: 0.65rem;">运行内核</div>
                <div id="box-bin" class="value" style="font-size: 0.9rem; color: #3b82f6;">-</div>
            </div>
            <div class="info-item">
                <div class="label" style="font-size: 0.65rem;">网络模式</div>
                <div id="box-net" class="value" style="font-size: 0.9rem; color: #8b5cf6;">-</div>
            </div>
            <div class="info-item">
                <div class="label" style="font-size: 0.65rem;">代理模式</div>
                <div id="box-proxy" class="value" style="font-size: 0.9rem; color: #60a5fa;">-</div>
            </div>
            <div class="info-item">
                <div class="label" style="font-size: 0.65rem;">核心 PID</div>
                <div id="box-pid" class="value" style="font-size: 0.9rem; color: #10b981;">-</div>
            </div>
        </div>

        <div class="card" id="config-detector-card">
            <div class="label" style="margin-bottom: 8px;">核心与配置发现 (基于 settings.ini)</div>
            <div id="detector-status" style="padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; border: 1px dashed rgba(255, 255, 255, 0.2);">
                <div style="font-size: 0.8rem; color: #94a3b8;">当前核心: <span id="detected-core" style="color: #60a5fa;">检测中...</span></div>
                <div style="font-size: 0.7rem; color: #64748b; margin-top: 4px; word-break: break-all;">关联路径: <span id="detected-conf-path" style="color: #a78bfa;">-</span></div>
            </div>
            
            <div id="mapping-container" style="max-height: 250px; overflow-y: auto; margin-top: 15px; display: none;">
                <div class="label" style="font-size: 0.75rem; margin-bottom: 8px;">订阅更新项目 (已自动解析)</div>
                <div id="mapping-list"></div>
            </div>

            <div class="label-group" style="margin-top: 15px;">
                <span class="label">更新周期</span>
                <div style="display: flex; align-items: center;">
                    <input type="number" id="interval-num" min="1" max="1440" value="30" style="background: rgba(0,0,0,0.3); border: 1px solid #334155; color: #fff; padding: 5px 10px; border-radius: 8px; width: 80px; text-align: center; font-family: inherit; font-size: 1.1rem; outline: none;">
                    <span class="value" style="margin-left: 10px; font-size: 1rem; color: #94a3b8;">min</span>
                </div>
            </div>
            <button id="save-btn" style="margin-top: 15px;">保存配置并启动监控</button>
        </div>

        <div class="card" id="recovery-card" style="display: flex; gap: 10px; padding: 16px;">
            <button id="backup-btn" style="flex: 1; background: linear-gradient(135deg, #8b5cf6, #d946ef); padding: 10px; font-size: 0.85rem;">备份配置</button>
            <button id="restore-btn" style="flex: 1; background: linear-gradient(135deg, #f59e0b, #ef4444); padding: 10px; font-size: 0.85rem;">还原备份</button>
        </div>

        <div class="card">
            <div class="label-group">
                <span class="label">服务状态</span>
                <div id="status-container">
                    <span id="box-status" style="font-size: 0.8rem; color: #94a3b8;"><span class="status-dot" style="background: #94a3b8; box-shadow: none;"></span>检测中...</span>
                    <span id="updater-status" style="font-size: 0.8rem; color: #10b981; margin-left: 10px;"><span class="status-dot"></span>更新器就绪</span>
                </div>
            </div>
            <div id="file-info" style="font-size: 0.75rem; color: #94a3b8; margin-bottom: 12px; padding: 0 4px;">
                配置文件最后刷新: <span id="mtime-val" style="color: #3b82f6;">正在获取...</span>
            </div>
            <div class="log-container" id="log-box">
                <div class="log-line">等待加载日志...</div>
            </div>
            <button id="update-btn" style="margin-top: 15px; background: rgba(59, 130, 246, 0.1); border: 1px solid var(--primary); box-shadow: none;">立即手动更新</button>
        </div>
    </div>

    <script>
        // Magisk WebUI 通信路径
        const MOD_DIR = window.location.pathname.split('webroot')[0];
        const CONF_PATH = '/storage/emulated/0/Android/sub_config.conf';
        const LOG_PATH = '/storage/emulated/0/Android/sub.log';

        const SETTINGS_PATH = '/data/adb/box/box/settings.ini';
        let detectedMainConf = '';

        // 核心：全自动侦测逻辑
        const autoDetectConfig = async () => {
            try {
                const response = await fetch('/api/read?path=' + encodeURIComponent(SETTINGS_PATH));
                if (!response.ok) throw new Error('settings.ini 无法访问');
                const content = await response.text();

                // 提取 bin_name
                const binMatch = content.match(/^bin_name="([^"]+)"/m);
                const binName = binMatch ? binMatch[1] : 'Unknown';
                document.getElementById('detected-core').innerText = binName;

                // 准备变量替换
                const boxDirMatch = content.match(/^box_dir="([^"]+)"/m);
                const boxDir = boxDirMatch ? boxDirMatch[1] : '/data/adb/box';

                // 提取对应核心的配置文件
                let confKey = '';
                if (binName === 'mihomo') confKey = 'mihomo_config';
                else if (binName === 'sing-box') confKey = 'sing_config';
                else if (binName === 'xray') confKey = 'xray_config';
                else if (binName === 'v2fly') confKey = 'v2fly_config';
                else if (binName === 'hysteria') confKey = 'hysteria_config';

                if (confKey) {
                    const confMatch = content.match(new RegExp(`^${confKey}="([^"]+)"`, 'm'));
                    if (confMatch) {
                        // 展开变量: ${box_dir} -> /data/adb/box
                        detectedMainConf = confMatch[1].replace('${box_dir}', boxDir);
                        document.getElementById('detected-conf-path').innerText = detectedMainConf;
                        
                        // 自动触发解析
                        parseConfigFile(detectedMainConf);
                    }
                }
            } catch (e) {
                console.error(e);
                document.getElementById('detected-core').innerText = '未找到 Box';
            }
        };

        // 核心解析函数：智能识别内核并提取订阅
        const parseConfigFile = async (path) => {
            try {
                const response = await fetch('/api/read?path=' + encodeURIComponent(path));
                if (!response.ok) throw new Error('关联的配置文件不可读');
                const content = await response.text();
                
                let providers = [];
                let type = path.endsWith('.json') ? 'sing-box' : 'mihomo';

                if (type === 'sing-box') {
                    try {
                        const json = JSON.parse(content);
                        if (json.providers) providers = json.providers.map(p => ({ tag: p.tag, path: p.path }));
                    } catch(e) { type = 'mihomo'; } // 容错处理
                }
                
                if (type === 'mihomo') {
                    const regex = /^\s*([^:\s]+):\s*(?:[\s\S]*?)path:\s*(['"]?)(.+?)\2/gm;
                    let match;
                    const section = content.split('proxy-providers:')[1];
                    if (section) {
                        while ((match = regex.exec(section)) !== null) {
                            providers.push({ tag: match[1], path: match[3] });
                        }
                    }
                }

                if (providers.length > 0) {
                    renderMappingList(providers, type);
                }
            } catch (e) {
                console.error(e);
            }
        };

        // 渲染勾选列表
        const renderMappingList = (list, type) => {
            mappingContainer.style.display = 'block';
            mappingList.innerHTML = list.map(item => `
                <div class="mapping-item">
                    <div>
                        <div class="mapping-tag">${item.tag} <small style="color:#10b981">[${type}]</small></div>
                        <div class="mapping-path">${item.path}</div>
                    </div>
                    <div class="checkbox-container">
                        <input type="checkbox" class="sub-check" data-tag="${item.tag}" data-path="${item.path}" checked>
                    </div>
                </div>
            `).join('');
        };

        window.onload = () => {
            getBoxInfo();
            checkBoxStatus();
            refreshLogs();
            loadSavedConfig();
            autoDetectConfig(); // 全自动开启
        };

        // 加载已保存的配置
        const loadSavedConfig = async () => {
            try {
                const response = await fetch('/api/read?path=' + encodeURIComponent(CONF_PATH));
                if (response.ok) {
                    const text = await response.text();
                    const intervalMatch = text.match(/INTERVAL=(\d+)/);
                    if (intervalMatch) intervalInput.value = intervalMatch[1];
                    
                    // 恢复已勾选状态 (后续可增加持久化勾选记忆)
                }
            } catch (e) {}
        };

        const getBoxInfo = async () => {
            try {
                const verCmd = "grep '^version=' /data/adb/modules/box_for_root/module.prop | cut -d= -f2";
                const verResp = await fetch('/api/exec?cmd=' + encodeURIComponent(verCmd));
                if (verResp.ok) {
                    const ver = await verResp.text();
                    boxVersionDisp.innerText = 'Box for Root v' + (ver.trim() || 'Custom');
                }
                const cmd = "grep -E '^(bin_name|network_mode|proxy_mode)=' /data/adb/box/box/settings.ini | tr -d '\"'";
                const response = await fetch('/api/exec?cmd=' + encodeURIComponent(cmd));
                if (response.ok) {
                    const text = await response.text();
                    const info = {};
                    text.split('\n').forEach(line => {
                        const [key, val] = line.split('=');
                        if (key) info[key.trim()] = val.trim();
                    });
                    if (info.bin_name) boxBinDisp.innerText = info.bin_name;
                    if (info.network_mode) boxNetDisp.innerText = info.network_mode.toUpperCase();
                    if (info.proxy_mode) boxProxyDisp.innerText = info.proxy_mode;
                }
                const pidResp = await fetch('/api/exec?cmd=' + encodeURIComponent('pidof box'));
                const pid = await pidResp.text();
                boxPidDisp.innerText = pid.trim() || '未运行';
            } catch (e) {}
        };

        const checkBoxStatus = async () => {
            try {
                const response = await fetch('/api/exec?cmd=' + encodeURIComponent('pidof box'));
                if (response.ok) {
                    const pid = await response.text();
                    if (pid.trim()) {
                        boxStatusDisp.innerHTML = '<span class="status-dot" style="background: #10b981; box-shadow: 0 0 8px #10b981;"></span>Box 已开启';
                        boxStatusDisp.style.color = '#10b981';
                        return true;
                    }
                }
            } catch (e) {}
            boxStatusDisp.innerHTML = '<span class="status-dot" style="background: #ef4444; box-shadow: 0 0 8px #ef4444;"></span>Box 未开启';
            boxStatusDisp.style.color = '#ef4444';
            return false;
        };

        document.getElementById('update-btn').onclick = async () => {
            const isRunning = await checkBoxStatus();
            if (!isRunning) return alert('Box 未开启！');
            await fetch('/api/exec?cmd=' + encodeURIComponent(`${MOD_DIR}box-sub-up.sh &`));
            alert('指令已发出。');
        };

        const getFileMtime = async () => { };

        // 保存逻辑：构建映射字符串
        document.getElementById('save-btn').onclick = async () => {
            const val = parseInt(intervalInput.value);
            if (!detectedMainConf) return alert('未侦测到有效的 Box 主配置路径，请检查 Box 是否安装正确。');
            
            const checks = document.querySelectorAll('.sub-check:checked');
            const mapStr = Array.from(checks).map(c => `${c.dataset.tag}|${c.dataset.path}`).join(';');
            
            if (!mapStr) return alert('请选择至少一个需要自动更新的项目。');

            const coreType = detectedMainConf.endsWith('.json') ? 'sing-box' : 'mihomo';
            const content = `INTERVAL=${val}\nCORE_TYPE="${coreType}"\nMAIN_CONF="${detectedMainConf}"\nWATCH_MAP="${mapStr}"`;

            try {
                await fetch('/api/write?path=' + encodeURIComponent(CONF_PATH) + '&data=' + encodeURIComponent(content));
                alert('智能监控已激活！更新器将精准守护您选择的项目。');
            } catch (e) {
                alert('保存失败。');
            }
        };

        // 备份逻辑
        document.getElementById('backup-btn').onclick = async () => {
            if (!detectedMainConf) return alert('未侦测到核心路径，无法备份。');
            
            const bakDir = '/storage/emulated/0/Android/box_config_bak';
            const binName = document.getElementById('detected-core').innerText;
            const ext = detectedMainConf.endsWith('.json') ? 'json' : 'yaml';
            const bakPath = `${bakDir}/${binName}_config.${ext}.bak`;

            const cmd = `mkdir -p ${bakDir} && cp -f "${detectedMainConf}" "${bakPath}"`;
            
            try {
                await fetch('/api/exec?cmd=' + encodeURIComponent(cmd));
                alert(`备份成功！\n核心: ${binName}\n路径: ${bakPath}`);
            } catch (e) {
                alert('备份失败，请检查写入权限。');
            }
        };

        // 还原逻辑 (动态对齐)
        document.getElementById('restore-btn').onclick = async () => {
            await autoDetectConfig(); // 还原前强制刷新一次侦测，确保路径对齐
            
            if (!detectedMainConf) return alert('未侦测到核心路径，无法还原。');
            
            const bakDir = '/storage/emulated/0/Android/box_config_bak';
            const binName = document.getElementById('detected-core').innerText;
            const ext = detectedMainConf.endsWith('.json') ? 'json' : 'yaml';
            const bakPath = `${bakDir}/${binName}_config.${ext}.bak`;

            // 检查备份文件是否存在
            const checkCmd = `[ -f "${bakPath}" ] && echo "exists"`;
            try {
                const resp = await fetch('/api/exec?cmd=' + encodeURIComponent(checkCmd));
                const text = await resp.text();
                if (text.trim() !== 'exists') {
                    return alert(`未找到对应的备份文件：\n${bakPath}\n请先执行备份操作。`);
                }

                if (!confirm(`确定要将备份还原至以下路径吗？\n${detectedMainConf}\n此操作将覆盖当前配置！`)) return;

                const restoreCmd = `cp -f "${bakPath}" "${detectedMainConf}"`;
                await fetch('/api/exec?cmd=' + encodeURIComponent(restoreCmd));
                alert('还原成功！正在重新解析配置文件内容...');
                parseConfigFile(detectedMainConf);
            } catch (e) {
                alert('还原过程中发生错误。');
            }
        };

        const refreshLogs = async () => {
            try {
                const response = await fetch('/api/read?path=' + encodeURIComponent(LOG_PATH));
                const text = await response.text();
                logBox.innerHTML = text.split('\n').map(line => `<div class="log-line">${line}</div>`).join('');
                logBox.scrollTop = logBox.scrollHeight;
            } catch (e) {}
        };

        setInterval(getBoxInfo, 10000);
        setInterval(checkBoxStatus, 5000);
        setInterval(refreshLogs, 3000);
    </script>
    </script>
</body>
</html>
