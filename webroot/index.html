<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box 订阅管理器 API 版</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --text: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', -apple-system, system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            margin-bottom: 24px;
            text-align: center;
        }

        h1 {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .label-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .label { font-size: 0.85rem; color: #94a3b8; font-weight: 500; }
        .value { font-size: 1.1rem; font-weight: 700; color: var(--primary); }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:active { transform: scale(0.98); opacity: 0.9; }
        button:disabled { background: #475569; box-shadow: none; cursor: not-allowed; opacity: 0.7; }

        .btn-update-all {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            margin-top: 15px;
            font-size: 1.1rem;
        }

        .provider-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .provider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .provider-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #e2e8f0;
            word-break: break-all;
        }

        .provider-meta {
            font-size: 0.75rem;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
        }

        .btn-update-single {
            padding: 6px 12px;
            font-size: 0.8rem;
            width: auto;
            border-radius: 8px;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.5);
            box-shadow: none;
            color: #60a5fa;
        }

        .log-container {
            background: #000;
            border-radius: 12px;
            padding: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            height: 120px;
            overflow-y: auto;
            border: 1px solid #334155;
            margin-top: 15px;
        }

        .log-line { color: #10b981; white-space: pre-wrap; margin-bottom: 4px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        input[type="number"] {
            background: rgba(0,0,0,0.3); border: 1px solid #334155; color: #fff;
            padding: 8px 12px; border-radius: 8px; width: 80px; text-align: center;
            font-family: inherit; font-size: 1rem; outline: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>订阅管家 (API直连版)</h1>
            <div id="box-version" style="font-size: 0.75rem; color: #94a3b8; margin-top: 6px;">Box for Root [加载中...]</div>
        </header>

        <!-- API 状态 -->
        <div class="card">
            <div class="label-group" style="margin-bottom: 0;">
                <span class="label">内核 API 连接状态</span>
                <div id="api-status">
                    <span class="status-dot" style="background: #94a3b8;"></span>
                    <span style="font-size: 0.85rem; color: #94a3b8;" id="api-status-text">检测中...</span>
                </div>
            </div>
            <div id="api-details" style="font-size: 0.7rem; color: #64748b; margin-top: 6px; text-align: right; display: none;"></div>
        </div>

        <!-- Provider 列表 -->
        <div class="card" id="providers-card">
            <div class="label-group">
                <span class="label">已发现的订阅项 (Providers)</span>
                <span class="value" style="font-size: 0.9rem;" id="provider-count">0</span>
            </div>
            
            <div id="provider-list" style="max-height: 300px; overflow-y: auto; margin: 15px 0;">
                <div style="text-align: center; color: #64748b; font-size: 0.85rem; padding: 20px;">
                    正在获取订阅列表...
                </div>
            </div>

            <button id="btn-update-all" class="btn-update-all" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.27l5.25 1.7"/></svg>
                <span>一键更新全部</span>
            </button>
        </div>

        <!-- 配置与日志 -->
        <div class="card">
            <div class="label-group">
                <span class="label">后台守护更新周期</span>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="number" id="interval-input" min="1" max="1440" value="30">
                    <span style="color: #94a3b8; font-size: 0.9rem;">分钟</span>
                    <button id="btn-save" style="width: auto; padding: 8px 16px; font-size: 0.85rem;">保存设置</button>
                </div>
            </div>
            
            <div class="log-container" id="log-box">
                <div class="log-line">等待加载日志...</div>
            </div>
        </div>
    </div>

    <script>
        // 统一接口层：适配 KSU / APatch / Box Web 服务
        const shellExec = async (cmd) => {
            try {
                if (window.ksu && typeof window.ksu.exec === 'function') {
                    let res = await window.ksu.exec(cmd);
                    if (typeof res === 'string') { try { res = JSON.parse(res); } catch(e){} }
                    return res ? (res.out !== undefined ? res.out : (res.stdout !== undefined ? res.stdout : JSON.stringify(res))) : String(res);
                }
                if (window.apatch && typeof window.apatch.exec === 'function') {
                    let res = await window.apatch.exec(cmd);
                    if (typeof res === 'string') { try { res = JSON.parse(res); } catch(e){} }
                    return res ? (res.out !== undefined ? res.out : (res.stdout !== undefined ? res.stdout : JSON.stringify(res))) : String(res);
                }
                // 回退到 Box 标准 REST 层
                const resp = await fetch('/api/exec?cmd=' + encodeURIComponent(cmd));
                return resp.ok ? await resp.text() : '';
            } catch (e) {
                console.error("Exec err:", e);
                return '';
            }
        };

        let apiAddr = '127.0.0.1:9090';
        let apiSecret = '';
        let curlBin = 'curl';
        const CONF_PATH = '/storage/emulated/0/Android/sub_config.conf';
        const LOG_PATH = '/storage/emulated/0/Android/sub.log';

        // HTML 转义工具，防止 Provider 名称中的特殊字符破坏 DOM 或引发 XSS
        const escapeHtml = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        let providersList = [];

        // 探测 curl 工具，因为大量国产源生安卓没有自带 curl
        const initCurl = async () => {
            let res = await shellExec('command -v curl || echo "NULL"');
            if (res.includes("NULL") || res.trim() === "") {
                let boxc = await shellExec('[ -x "/data/adb/box/bin/curl" ] && echo "/data/adb/box/bin/curl" || echo "NULL"');
                if (boxc.includes("/data/adb/box/bin/curl")) {
                    curlBin = '/data/adb/box/bin/curl';
                }
            }
        };

        // 侦测 API 信息 — 直接用 shell 原生 source 解析，杜绝 JS 变量展开失败
        const detectApi = async () => {
            try {
                // NOTE: 让 shell 自己 source settings.ini 展开所有变量（box_dir、name_mihomo_config 等），
                // 再用 awk 从真实配置文件中提取 API 地址和密钥，最后以 KEY=VALUE 格式输出。
                const result = await shellExec(`
                    bb_awk="awk"
                    [ -x "/data/adb/magisk/busybox" ] && bb_awk="/data/adb/magisk/busybox awk"
                    [ -x "/data/adb/ksu/bin/busybox" ] && bb_awk="/data/adb/ksu/bin/busybox awk"

                    [ ! -f "/data/adb/box/settings.ini" ] && echo "ERR=no_settings" && exit 0
                    . /data/adb/box/settings.ini 2>/dev/null
                    bin_name=$(echo "$bin_name" | tr -d '\r')
                    mihomo_config=$(echo "$mihomo_config" | tr -d '\r')
                    sing_config=$(echo "$sing_config" | tr -d '\r')

                    echo "BIN=$bin_name"

                    case "$bin_name" in
                        mihomo)
                            if [ -f "$mihomo_config" ]; then
                                echo "CFG=$mihomo_config"
                                ec=$($bb_awk '/^external-controller:/{print $2}' "$mihomo_config" 2>/dev/null | tr -d "'\\"")
                                sc=$($bb_awk '/^secret:/{print $2}' "$mihomo_config" 2>/dev/null | tr -d "'\\"")
                                [ -n "$ec" ] && echo "EC=$ec"
                                [ -n "$sc" ] && echo "SC=$sc"
                            else
                                echo "ERR=config_not_found"
                            fi
                            ;;
                        sing-box)
                            if [ -f "$sing_config" ]; then
                                echo "CFG=$sing_config"
                                ec=$($bb_awk -F'[:,]' '/\\"external_controller\\"/{print $2":"$3}' "$sing_config" 2>/dev/null | tr -d ' "')
                                sc=$($bb_awk -F'"' '/\\"secret\\"/{print $4}' "$sing_config" 2>/dev/null | head -1)
                                [ -n "$ec" ] && echo "EC=$ec"
                                [ -n "$sc" ] && echo "SC=$sc"
                            else
                                echo "ERR=config_not_found"
                            fi
                            ;;
                        *)
                            echo "ERR=unsupported_core_$bin_name"
                            ;;
                    esac
                `);

                console.log('detectApi shell output:', result);

                // 解析 shell 输出的 KEY=VALUE 行
                const get = (key) => { const m = result.match(new RegExp('^' + key + '=(.+)$', 'm')); return m ? m[1].trim() : ''; };

                const errMsg = get('ERR');
                const binName = get('BIN') || '未知';
                const ec = get('EC');
                const sc = get('SC');
                const cfgPath = get('CFG');

                if(ec) apiAddr = ec.replace(/0\.0\.0\.0/g, '127.0.0.1');
                if(sc) apiSecret = sc;

                let detailText = `${apiAddr} (核心: ${binName} | Secret: ${apiSecret ? '已配置' : '无'})`;
                if(errMsg) detailText += ` | ⚠ ${errMsg}`;
                if(cfgPath) detailText += ` | 配置: ${cfgPath}`;

                document.getElementById('api-details').innerText = detailText;
                document.getElementById('api-details').style.display = 'block';
                return !errMsg;
            } catch(e) {
                console.error("Detect API info err:", e);
                return false;
            }
        };

        // 通过 curl 调用 API（规避 CORS 问题与浏览器原生限制）
        const fetchApi = async (endpoint, method = 'GET') => {
            let cmd = curlBin + ' -s -X ' + method + ' --connect-timeout 5 "http://' + apiAddr + endpoint + '"';
            if(apiSecret) cmd = curlBin + ' -s -X ' + method + ' -H "Authorization: Bearer ' + apiSecret + '" --connect-timeout 5 "http://' + apiAddr + endpoint + '"';
            if(method === 'PUT') cmd += ' -d "" -w "\\n%{http_code}"';
            return await shellExec(cmd);
        };

        // 获取 Providers 列表
        const loadProviders = async () => {
            const statusEl = document.getElementById('api-status-text');
            const dotEl = document.querySelector('#api-status .status-dot');
            const listEl = document.getElementById('provider-list');
            const btnAll = document.getElementById('btn-update-all');
            
            try {
                // 1. 测试基础连接与 curl 的执行情况
                let versionCmdCheck = await fetchApi('/version');
                if(!versionCmdCheck || (!versionCmdCheck.includes('meta') && !versionCmdCheck.includes('version'))) {
                    throw new Error(`探测 /version 失败。\n当前所用 API地址: ${apiAddr}\n当前 Curl命令: ${curlBin}\n原生返回打印: [${versionCmdCheck}]`);
                }
                
                statusEl.innerText = '已连接';
                statusEl.style.color = 'var(--success)';
                dotEl.style.background = 'var(--success)';
                dotEl.style.boxShadow = '0 0 8px var(--success)';

                // 2. 抓取 providers
                let provOutput = await fetchApi('/providers/proxies');
                let data = null;
                try { 
                    data = JSON.parse(provOutput); 
                } catch(e) {
                    throw new Error(`解析 Providers 失败。\n并非合法 JSON。\n原生内容截断前200字符: ${String(provOutput).substring(0, 200)}`);
                }

                if(data && data.providers) {
                    const providers = Object.values(data.providers).filter(p => p.vehicleType !== 'Compatible'); 
                    
                    document.getElementById('provider-count').innerText = providers.length;

                    if(providers.length === 0) {
                        listEl.innerHTML = '<div style="text-align: center; color: #94a3b8; font-size: 0.85rem; padding: 20px;">未发现订阅项，请检查配置文件。</div>';
                        btnAll.disabled = true;
                        return;
                    }

                    btnAll.disabled = false;
                    providersList = providers;
                    listEl.innerHTML = providers.map((p, idx) => {
                        let timeStr = p.updatedAt ? new Date(p.updatedAt).toLocaleString() : '未知';
                        return `
                        <div class="provider-item" data-idx="${idx}">
                            <div class="provider-header">
                                <span class="provider-name">${escapeHtml(p.name)}</span>
                                <button class="btn-update-single" data-idx="${idx}">更新</button>
                            </div>
                            <div class="provider-meta">
                                <span>类型: ${escapeHtml(p.vehicleType || 'N/A')}</span>
                                <span>上次刷新: <span class="prov-time">${escapeHtml(timeStr)}</span></span>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    throw new Error(`返回的结构里缺失 providers 字段。`);
                }

            } catch(e) {
                console.error(e);
                statusEl.innerText = '执行崩溃，请检查日志框或下方';
                statusEl.style.color = 'var(--danger)';
                dotEl.style.background = 'var(--danger)';
                dotEl.style.boxShadow = '0 0 8px var(--danger)';
                btnAll.disabled = true;
                
                // 将极其详细的错误打在原本的列表里，方面排错！
                listEl.innerHTML = `<div style="color: var(--danger); font-size: 0.8rem; padding: 12px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; white-space: pre-wrap; word-break: break-all;"><b>[ 诊断报错 ]</b>\n${escapeHtml(e.message)}</div>`;
            }
        };

        // 一键更新全部
        document.getElementById('btn-update-all').onclick = async () => {
            const btn = document.getElementById('btn-update-all');
            const svg = btn.querySelector('svg');
            btn.disabled = true;
            svg.classList.add('spin');
            btn.querySelector('span').innerText = '正在后台触发更新...';

            await shellExec('sh /data/adb/modules/box-sub-up/box-sub-up.sh --once &');
            
            setTimeout(() => {
                svg.classList.remove('spin');
                btn.querySelector('span').innerText = '一键更新全部';
                btn.disabled = false;
                loadProviders();
                loadLogs();
                alert("已触发更新任务，请查看日志获取结果。");
            }, 3000);
        };

        // 更新单个 Provider（通过索引定位，避免名称特殊字符导致选择器崩溃）
        const updateSingle = async (idx) => {
            const p = providersList[idx];
            if (!p) return;
            const btn = document.querySelector(`.provider-item[data-idx="${idx}"] .btn-update-single`);
            if (!btn) return;
            btn.innerText = '更新中...';
            btn.disabled = true;
            
            let res = await fetchApi('/providers/proxies/' + encodeURIComponent(p.name), 'PUT');
            let code = res.split('\n').pop();
            
            if(code === '204' || code === '200') {
                btn.innerText = '已触发';
                btn.style.color = 'var(--success)';
                btn.style.borderColor = 'var(--success)';
            } else {
                btn.innerText = '失败 ' + code;
                btn.style.color = 'var(--danger)';
                btn.style.borderColor = 'var(--danger)';
            }
            setTimeout(() => {
                btn.innerText = '更新';
                btn.disabled = false;
                btn.style = '';
                loadProviders();
                loadLogs();
            }, 3000);
        };

        // 事件委托：Provider 列表的按钮点击
        document.getElementById('provider-list').addEventListener('click', (e) => {
            const btn = e.target.closest('.btn-update-single');
            if (btn && !btn.disabled) updateSingle(parseInt(btn.dataset.idx));
        });

        // 保存配置
        document.getElementById('btn-save').onclick = async () => {
            const val = document.getElementById('interval-input').value;
            await shellExec(`echo "INTERVAL=${val}" > ${CONF_PATH}`);
            alert('守护周期已保存。');
        };

        // 加载配置和日志
        const loadCfgAndLogs = async () => {
            let cfg = await shellExec(`cat ${CONF_PATH} 2>/dev/null`);
            if(cfg) {
                let m = cfg.match(/INTERVAL=(\d+)/);
                if(m) document.getElementById('interval-input').value = m[1];
            }
            
            let ver = await shellExec("grep '^version=' /data/adb/modules/box_for_root/module.prop 2>/dev/null | cut -d= -f2");
            document.getElementById('box-version').innerText = 'Box for Root v' + (ver.trim() || '未知');
            
            loadLogs();
        };

        const loadLogs = async () => {
            let log = await shellExec(`cat ${LOG_PATH} 2>/dev/null`);
            const logBox = document.getElementById('log-box');
            if(log) {
                logBox.innerHTML = log.split('\n').filter(l=>l.trim()).map(l => `<div class="log-line">${escapeHtml(l)}</div>`).join('');
                logBox.scrollTop = logBox.scrollHeight;
            } else {
                logBox.innerHTML = '<div class="log-line">暂无运行日志</div>';
            }
        };

        // 初始化
        window.onload = async () => {
            await initCurl();
            await detectApi();
            await loadCfgAndLogs();
            await loadProviders();
            setInterval(loadProviders, 10000);
            setInterval(loadLogs, 5000);
        };
    </script>
</body>
</html>
